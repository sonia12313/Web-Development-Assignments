<!DOCTYPE html>
<html>
<head>
    <title>Puppy Lovers Page</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: "Segoe UI", 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #1a4a8e;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        img {
            border-radius: 10px;
            box-shadow: 0 4px 9px rgba(0, 0, 0, 0.1);
            margin: 10px;
            transition: transform 0.3s;
        }
        img:hover { 
            transform: scale(1.05);
        }
        .missing-box {
            background-color: #ff5252;
            color: white;
            width: 200px;
            height: 200px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 10px;
        }
        footer {
            background-color: #00acc1;
            color: white;
            text-align: center;
            padding: 15px;
            position: relative;
            bottom: 0;
            width: 100px;
        }
    </style>
</head>
<body bgcolor="#f4f4f4">

    <table width="100%" bgcolor="#1a4a9a" cellpadding="10">
        <tr>
            <td align="center">
                <font color="white" size="5"><b>Puppy lovers page</b></font>
            </td>
        </tr>
    </table>

    <center>
        <img src="banner-puppies.jpg" width="600" alt="Banner">
    </center>

    <br>

    <table align="center" border="0" cellpadding="10">
        <tr>
            <td><img src="puppy-1.jpg" width="150" height="150"></td>
            <td bgcolor="#ff5e6c" width="150" height="150" align="center">
                <font color="white">Puppy missing here!!</font>
            </td>
            <td><img src="puppy-2.jpg" width="150" height="150"></td>
        </tr>
    </table>

    <center>
        <h3>More Puppies</h3>
    </center>

    <table align="center" border="0" cellpadding="10">
        <tr>
            <td><img src="puppy-3.jpg" width="230"></td>
            <td><img src="puppy-4.jpg" width="230"></td>
        </tr>
    </table>

    <br>

    <table width="100%" bgcolor="#4da6ff" cellpadding="15">
        <tr>
            <td align="center">
                <font color="white">Developed by: Sonia Hailay</font>
            </td>
        </tr>
    </table>

</body>
</html>
